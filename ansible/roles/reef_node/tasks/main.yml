- name: Check Reef node state
  ansible.builtin.script:
    cmd: "reef_node_apply.py check {{ reef_node.desired | to_json | b64encode }}"
  register: reef_node_check
  check_mode: false
  changed_when: (reef_node_check.stdout | trim | from_json).changed

- name: Store Reef node plan
  ansible.builtin.set_fact:
    reef_node_plan: "{{ reef_node_check.stdout | trim | from_json }}"

- name: End unchanged or check-only Reef node
  ansible.builtin.meta: end_host
  when: >
    ansible_check_mode
    or reef_node_plan.up_to_date

- name: Create Reef node staging directory
  ansible.builtin.file:
    path: "{{ reef_node.stage_dir }}"
    state: directory
    mode: "0700"
  when: reef_node_plan.uploads | length > 0

- name: Upload changed Reef node items
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ reef_node.stage_dir }}/{{ item.id }}"
    mode: "0600"
  loop: "{{ reef_node.deploy_items | selectattr('id', 'in', reef_node_plan.uploads) | list }}"
  when: reef_node_plan.uploads | length > 0
  diff: false

- name: Apply Reef node plan
  ansible.builtin.script:
    cmd: "reef_node_apply.py apply {{ reef_node.desired | to_json | b64encode }} {{ reef_node.stage_dir }}"
  register: reef_node_apply
  changed_when: (reef_node_apply.stdout | trim | from_json).changed
