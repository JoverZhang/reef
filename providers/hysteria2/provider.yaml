id: hysteria2

runtime:
  local_path: bin/hysteria-linux-amd64
  remote_path: "{{ remote_dir }}/bin/transport"

vendor:
  assets:
    - path: bin/hysteria-linux-amd64
      url: https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
      check_args: [version]

    - path: bin/mihomo-linux-amd64
      gzip: true
      github_latest:
        repo: MetaCubeX/mihomo
        starts_with: mihomo-linux-amd64-
        ends_with: .gz
        reject_contains:
          - -compatible-
          - -v1-
          - -v2-
          - -v3-
          - -go
      check_args: [-v]

template_vars:
  masquerade_url: https://news.ycombinator.com/

route_vars:
  relay:
    socks_port: "{{ 11000 + route.exit.index }}"
    stats_port: "{{ 12000 + route.exit.index }}"
  direct:
    stats_port: "{{ 13000 + route.exit.index }}"

services:
  relay:
    - reef-gateway-server@{{ route.exit.id }}.service
    - reef-gateway-client@{{ route.exit.id }}.service
  direct:
    - reef-gateway-server@direct.service

smoke:
  client_path: bin/mihomo-linux-amd64
  log_name: client.log

node_files:
  - role: all
    per: node
    template: node/reef-gateway-server@.service.j2
    output: units/reef-gateway-server@.service
    dest: /etc/systemd/system/reef-gateway-server@.service

  - role: entry
    per: node
    template: node/reef-gateway-client@.service.j2
    output: units/reef-gateway-client@.service
    dest: /etc/systemd/system/reef-gateway-client@.service

  - role: entry
    per: relay
    template: node/server-relay.yaml.j2
    output: config/server-{{ route.exit.id }}.yaml
    dest: /opt/reef/config/server-{{ route.exit.id }}.yaml

  - role: entry
    per: relay
    template: node/client-relay.yaml.j2
    output: config/client-{{ route.exit.id }}.yaml
    dest: /opt/reef/config/client-{{ route.exit.id }}.yaml

  - role: exit
    per: direct
    template: node/server-direct.yaml.j2
    output: config/server-direct.yaml
    dest: /opt/reef/config/server-direct.yaml

subscriptions:
  - id: client
    output: client.yaml
    template: subscription/client.yaml.j2
    content_type: text/yaml; charset=utf-8
    mixed_port: 7890

  - id: linux-server
    output: linux-server.yaml
    template: subscription/linux-server.yaml.j2
    content_type: text/yaml; charset=utf-8
    mixed_port: 7890
